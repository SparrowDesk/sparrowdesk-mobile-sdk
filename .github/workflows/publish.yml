name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK version to publish (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── Android: Publish to GitHub Packages ──
      - name: Publish Android AAR
        run: |
          ./gradlew :sparrowdesk-sdk:publishAllPublicationsToGitHubPackagesRepository \
            -PSDK_VERSION="${{ inputs.version }}" \
            -PGITHUB_OWNER="${{ github.repository_owner }}" \
            -PGITHUB_REPO="${{ github.event.repository.name }}" \
            -Pgpr.user="${{ github.actor }}" \
            -Pgpr.token="${{ secrets.GITHUB_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── iOS: Build XCFramework ──
      - name: Build XCFramework
        run: ./gradlew :sparrowdesk-sdk:assembleSparrowDeskSDKXCFramework

      - name: Zip XCFramework
        run: ./gradlew :sparrowdesk-sdk:zipXCFramework -PSDK_VERSION="${{ inputs.version }}"

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum sparrowdesk-sdk/build/outputs/SparrowDeskSDK.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "XCFramework checksum: $CHECKSUM"

      # ── Create GitHub Release with XCFramework ──
      - name: Create GitHub Release
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            sparrowdesk-sdk/build/outputs/SparrowDeskSDK.xcframework.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Update Package.swift ──
      - name: Update Package.swift
        run: |
          sed -i '' 's|let version = ".*"|let version = "${{ inputs.version }}"|' Package.swift
          sed -i '' 's|let checksum = ".*"|let checksum = "${{ steps.checksum.outputs.checksum }}"|' Package.swift
          cat Package.swift

      - name: Commit Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: release v${{ inputs.version }} — update Package.swift checksum"
          git push
