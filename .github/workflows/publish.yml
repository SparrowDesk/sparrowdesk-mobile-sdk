name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK version to publish (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── iOS: Build XCFramework ──
      # Android distribution is served by JitPack directly from the git tag
      # (see jitpack.yml) — no publish step required in CI.
      - name: Build XCFramework
        run: ./gradlew :sparrowdesk-sdk:assembleSparrowDeskSDKXCFramework

      - name: Zip XCFramework
        run: ./gradlew :sparrowdesk-sdk:zipXCFramework -PSDK_VERSION="${{ inputs.version }}"

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum sparrowdesk-sdk/build/outputs/SparrowDeskSDK.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "XCFramework checksum: $CHECKSUM"

      # ── Create GitHub Release with XCFramework ──
      - name: Create GitHub Release
        run: |
          NOTES=$(cat <<EOF
          ## SparrowDesk SDK v${{ inputs.version }}

          ### Android (JitPack)

          Add the JitPack repository to \`settings.gradle.kts\`:

          \`\`\`kotlin
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://jitpack.io") }
              }
          }
          \`\`\`

          Then add the dependency in \`build.gradle.kts\`:

          \`\`\`kotlin
          implementation("com.github.SparrowDesk.sparrowdesk-mobile-sdk:sparrowdesk-sdk:${{ inputs.version }}")
          \`\`\`

          ### iOS (Swift Package Manager)

          Add this repo URL in Xcode, or add to \`Package.swift\`:

          \`\`\`swift
          .package(url: "https://github.com/SparrowDesk/sparrowdesk-mobile-sdk", from: "${{ inputs.version }}")
          \`\`\`
          EOF
          )
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes "$NOTES" \
            sparrowdesk-sdk/build/outputs/SparrowDeskSDK.xcframework.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Update Package.swift ──
      - name: Update Package.swift
        run: |
          sed -i '' 's|let version = ".*"|let version = "${{ inputs.version }}"|' Package.swift
          sed -i '' 's|let checksum = ".*"|let checksum = "${{ steps.checksum.outputs.checksum }}"|' Package.swift
          cat Package.swift

      - name: Commit Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: release v${{ inputs.version }} — update Package.swift checksum"
          git push
